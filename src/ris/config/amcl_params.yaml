laser_z_short: 0.05
laser_z_max: 0.05
laser_z_rand: 0.2
laser_sigma_hit: 0.2
laser_lambda_short: 0.1

odom_alpha1: 0.15
odom_alpha2: 0.15
odom_alpha3: 0.20
odom_alpha4: 0.20
odom_alpha5: 0.10

gui_publish_rate: 10.0
save_pose_rate: 0.5