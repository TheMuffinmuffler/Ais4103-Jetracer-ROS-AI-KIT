DWAPlannerROS:
  max_vel_x: 0.18
  min_vel_x: 0.03
  max_vel_trans: 0.18
  min_vel_trans: 0.03

  max_vel_theta: 0.30
  min_vel_theta: 0.10
  min_in_place_vel_theta: 0.10

  acc_lim_x: 0.35
  acc_lim_theta: 0.60

  sim_time: 0.8
  vx_samples: 6
  vtheta_samples: 12
  sim_granularity: 0.025
  angular_sim_granularity: 0.025

  path_distance_bias: 32.0
  goal_distance_bias: 12.0
  occdist_scale: 0.05
  forward_point_distance: 0.10
  stop_time_buffer: 0.20
  scaling_speed: 0.20
  max_scaling_factor: 0.10

  xy_goal_tolerance: 0.20
  yaw_goal_tolerance: 0.30
  latch_xy_goal_tolerance: false

  oscillation_reset_dist: 0.10