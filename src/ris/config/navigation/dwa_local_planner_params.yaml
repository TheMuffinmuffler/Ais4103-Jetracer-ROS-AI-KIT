DWAPlannerROS:
  max_vel_x: 0.20
  min_vel_x: 0.05
  max_vel_trans: 0.20
  min_vel_trans: 0.05

  max_vel_theta: 0.35
  min_vel_theta: 0.10
  min_in_place_vel_theta: 0.10

  acc_lim_x: 0.4
  acc_lim_theta: 0.6

  xy_goal_tolerance: 0.20
  yaw_goal_tolerance: 0.30
  latch_xy_goal_tolerance: false

  sim_time: 0.6
  sim_granularity: 0.025
  angular_sim_granularity: 0.025
  vx_samples: 4
  vtheta_samples: 8

  path_distance_bias: 40.0
  goal_distance_bias: 15.0
  occdist_scale: 0.02
  forward_point_distance: 0.10
  stop_time_buffer: 0.20
  scaling_speed: 0.20
  max_scaling_factor: 0.10

  oscillation_reset_dist: 0.10